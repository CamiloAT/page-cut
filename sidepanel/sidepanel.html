<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Cut</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="2" width="20" height="20" rx="4" fill="#a8d5a2"/>
          <path d="M7 12h10M12 7v10" stroke="#2d3a2d" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <h1>Page Cut</h1>
      </div>
      <span class="url-badge" id="currentUrl" title="URL actual">—</span>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="pick">Pick</button>
      <button class="tab" data-tab="shortcuts">Shortcuts <span id="shortcutCount"></span></button>
    </div>

    <div class="tab-content" id="tab-pick">
      <button class="btn btn-primary btn-full btn-pick" id="pickBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
        </svg>
        Seleccionar elemento
      </button>

      <div class="scan-status" id="scanStatus"></div>

      <div class="pick-hint">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
          <path d="M12 16v-4M12 8h.01"/>
        </svg>
        <span>Haz clic en "Seleccionar elemento", mueve el mouse sobre la página y elige el elemento</span>
      </div>

      <button class="btn btn-secondary btn-full btn-scan" id="scanBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        Escanear todos
      </button>

      <div class="element-list" id="elementList"></div>
    </div>

    <div class="tab-content hidden" id="tab-shortcuts">
      <div class="shortcut-list" id="shortcutList">
        <p class="empty-state">No hay shortcuts en esta página</p>
      </div>
    </div>

    <div class="modal hidden" id="assignModal">
      <div class="modal-backdrop" id="modalBackdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>Asignar shortcut</h3>
          <button class="btn-icon" id="closeModal">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="selected-element" id="selectedElement"></div>
          <div class="key-recorder">
            <label>Presiona la combinación de teclas:</label>
            <div class="key-display" id="keyDisplay">
              <span class="key-placeholder">Esperando teclas...</span>
            </div>
          </div>
          <label class="checkbox-label">
            <input type="checkbox" id="actionType" checked>
            <span>Hacer click al ejecutar</span>
          </label>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="cancelAssign">Cancelar</button>
          <button class="btn btn-primary" id="confirmAssign" disabled>Guardar</button>
        </div>
      </div>
    </div>

    <div class="toast hidden" id="toast">
      <span id="toastMessage"></span>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
